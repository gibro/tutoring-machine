<!-- 
    Moodle Chatbot Templates
    This template contains the structure, styles and scripts for the chatbot interface
-->

<!-- Inline CSS Styles -->
<style>
    /* Base styles */
    body {
        font-family: "Segoe UI", Roboto, Arial, sans-serif;
    }
    
    /* Chat widget (floating button) */
    #chat-widget {
        position: fixed;
        bottom: 10px;
        right: 10px;
        width: 140px;
        height: 108px;
        color: white;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        font-size: 24px;
        font-weight: bold;
        z-index: 9999;
        transition: transform 0.2s ease-in-out;
    }
    
    #chat-widget:hover {
        transform: scale(1.1);
    }

    /* Chat box container */
    #chat-box {
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 25%;
        max-width: 550px;
        min-width: 340px;
        height: 500px;
        background: white;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        border-radius: 12px;
        display: none;
        flex-direction: column;
        z-index: 9999;
        transform: translateY(20px);
        opacity: 0;
        transition: transform 0.3s ease-out, opacity 0.3s ease-out;
        resize: both;
        overflow: hidden;
    }

    #chat-box.active {
        display: flex;
        transform: translateY(0);
        opacity: 1;
    }

    /* Chat header */
    #chat-header {
        background: %%MAIN_COLOR%%;
        color: white;
        padding: 12px;
        text-align: center;
        border-top-left-radius: 12px;
        border-top-right-radius: 12px;
        font-weight: bold;
        position: relative;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    
    #chat-header .chat-title {
        flex-grow: 1;
        text-align: center;
    }
    
    #chat-header .chat-controls {
        display: flex;
        gap: 10px;
    }

    #chat-header .size-control {
        cursor: pointer;
        display: inline-block;
        margin-left: 5px;
        width: 16px;
        height: 16px;
        text-align: center;
    }
    
    #chat-header .close-button {
        cursor: pointer;
    }

    /* Messages container */
    #chat-messages {
        flex: 1;
        padding: 12px;
        overflow-y: auto;
        white-space: pre-line;
        display: flex;
        flex-direction: column;
        scroll-behavior: smooth;
    }
    
    /* Message formatting - headings */
    #chat-messages h3, #chat-messages h4, #chat-messages h5 {
        display: block;
        font-weight: bold;
        color: #333;
        margin-top: 16px;
        margin-bottom: 8px;
    }
    
    #chat-messages h3 { font-size: 16px; }
    #chat-messages h4 { font-size: 15px; }
    #chat-messages h5 { font-size: 14px; }
    
    /* Message formatting - lists */
    #chat-messages .numbered-item, #chat-messages .bullet-item {
        display: block;
        margin: 1px 0;
        padding: 1px 10px 1px 5px;
        background-color: rgba(240, 240, 240, 0.1);
    }
    
    #chat-messages .numbered-list {
        display: block;
        margin: 2px 0;
    }
    
    #chat-messages .numbered-list .numbered-item {
        margin: 0;
    }
    
    /* List spacing fixes */
    #chat-messages .numbered-list + .numbered-list,
    #chat-messages .bullet-item + .numbered-list,
    #chat-messages .numbered-list + .bullet-item {
        margin-top: 1px;
    }
    
    #chat-messages br + .numbered-list,
    #chat-messages br + .bullet-item {
        margin-top: 0;
        display: inline-block;
    }
    
    #chat-messages strong {
        margin-top: 8px;
        display: inline-block;
    }

    /* Chat bubbles */
    .chat-bubble {
        max-width: 85%;
        padding: 12px;
        border-radius: 15px;
        margin: 6px 0;
    }

    .user-message {
        background: %%MAIN_COLOR%%;
        color: white;
        align-self: flex-end;
        text-align: left;
        border-bottom-right-radius: 2px;
        white-space: pre-wrap;
    }

    .bot-message {
        background: #e3f2fd;
        color: black;
        align-self: flex-start;
        border-bottom-left-radius: 2px;
    }
    
    /* Error message */
    .error-message {
        background: #ffebee;
        color: #b71c1c;
        border-left: 3px solid #f44336;
        align-self: center;
        text-align: center;
        max-width: 95%;
    }
    
    /* Loading indicator */
    .loading {
        display: inline-block;
        width: 15px;
        height: 15px;
        border: 3px solid rgba(0, 0, 0, 0.3);
        border-radius: 50%;
        border-top-color: %%MAIN_COLOR%%;
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    /* Chat input area */
    #chat-input {
        display: flex;
        flex-direction: column;
        border-top: 1px solid #ddd;
        padding: 8px;
        background: #f8f9fa;
        border-bottom-left-radius: 12px;
        border-bottom-right-radius: 12px;
    }

    #chat-input textarea {
        width: 100%;
        padding: 8px;
        border: none;
        outline: none;
        border-radius: 5px;
        resize: none;
        min-height: 38px;
        max-height: 120px;
        overflow-y: auto;
        margin-bottom: 8px;
    }

    #chat-input .button-row {
        display: flex;
        justify-content: flex-end;
    }

    #chat-input button {
        background: %%MAIN_COLOR%%;
        color: white;
        border: none;
        width: 38px;
        height: 38px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        border-radius: 5px;
        margin-left: 8px;
    }
    
    /* Prompt suggestions */
    #prompt-suggestions-panel {
        display: none;
        position: absolute;
        bottom: 60px;
        left: 0;
        right: 0;
        background: white;
        border-top: 1px solid #ddd;
        max-height: 200px;
        overflow-y: auto;
        z-index: 100;
        box-shadow: 0 -2px 5px rgba(0,0,0,0.1);
        padding: 10px;
    }
    
    #prompt-back-button {
        display: none;
        padding: 5px 10px;
        margin-bottom: 10px;
        background: #f1f1f1;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
        text-align: left;
    }
    
    #prompt-back-button:hover {
        background: #e3e3e3;
    }
    
    .prompt-suggestion {
        cursor: pointer;
        padding: 8px 12px;
        margin-bottom: 5px;
        background: #f1f1f1;
        border-radius: 5px;
        transition: background 0.2s;
        font-size: 14px;
    }
    
    .prompt-suggestion:hover {
        background: #e3e3e3;
    }
    
    .prompt-category {
        cursor: pointer;
        padding: 8px 12px;
        margin-bottom: 5px;
        background: #e0e0e0;
        border-radius: 5px;
        transition: background 0.2s;
        font-size: 14px;
        font-weight: bold;
        border-left: 3px solid %%MAIN_COLOR%%;
    }
    
    .prompt-category:hover {
        background: #d0d0d0;
    }

    /* Animations */
    #fade-in {
        animation: fadeIn 0.5s ease-in-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

<!-- Chat Widget HTML Structure -->

<script>
    /**
     * Chatbot functionality
     *
     * This script handles the chatbot UI interaction, message formatting,
     * and communication with the server.
     */
    
    // Global variables
    let assistantName = "%%CHATBOT_NAME%%";
    let conversationHistory = [];
    let analyticsEnabled = %%ANALYTICS_ENABLED%%;
    let promptSuggestionsEnabled = %%PROMPT_SUGGESTIONS_ENABLED%%;
    let promptSuggestions = `%%PROMPT_SUGGESTIONS%%`;
    let promptSuggestionsOpen = false;

    // Global variables for chat box sizing
    let chatSizes = {
        'sm': { width: '25%', height: '500px', minWidth: '340px', maxWidth: '550px' },
        'md': { width: '35%', height: '600px', minWidth: '400px', maxWidth: '700px' },
        'lg': { width: '45%', height: '700px', minWidth: '450px', maxWidth: '900px' }
    };
    let currentSize = 'sm';
    
    // Event listeners and initialization
    document.addEventListener('DOMContentLoaded', initChatbot);
    
    /**
     * Initialize the chatbot interface
     */
    function initChatbot() {
        addEventListeners();
        
        // Check analytics status and force reset if needed
        const needsReset = checkAnalyticsStatus();
        
        // If we need to reset, don't load the old session
        if (!needsReset) {
            loadSession();
        }
        
        // Load saved size preference if it exists
        loadSizePreference();
        
        setTimeout(scrollToBottom, 100);
        showAnalyticsNotice();
        
        // Initialize prompt suggestions if enabled
        if (promptSuggestionsEnabled) {
            initPromptSuggestions();
        }
        
        // Initialize size controls
        initSizeControls();
    }
    
    /**
     * Initialize size control buttons
     */
    function initSizeControls() {
        document.getElementById('size-sm').addEventListener('click', function() {
            resizeChatBox('sm');
        });
        
        document.getElementById('size-md').addEventListener('click', function() {
            resizeChatBox('md');
        });
        
        document.getElementById('size-lg').addEventListener('click', function() {
            resizeChatBox('lg');
        });
    }
    
    /**
     * Resize the chat box
     */
    function resizeChatBox(size) {
        if (!chatSizes[size]) return;
        
        const chatBox = document.getElementById('chat-box');
        
        // Apply new dimensions
        chatBox.style.width = chatSizes[size].width;
        chatBox.style.height = chatSizes[size].height;
        chatBox.style.minWidth = chatSizes[size].minWidth;
        chatBox.style.maxWidth = chatSizes[size].maxWidth;
        
        // Save the current size
        currentSize = size;
        localStorage.setItem('chatBoxSize', size);
        
        // Scroll to bottom after resize
        setTimeout(scrollToBottom, 100);
    }
    
    /**
     * Load saved size preference
     */
    function loadSizePreference() {
        const savedSize = localStorage.getItem('chatBoxSize');
        if (savedSize && chatSizes[savedSize]) {
            resizeChatBox(savedSize);
        }
    }
    
    /**
     * Check if analytics status has changed
     * Resets the conversation if the status has changed since last visit
     */
    function checkAnalyticsStatus() {
        // Get stored analytics status
        const storedStatus = localStorage.getItem("analyticsEnabled");
        
        // If analytics status has changed since last visit, force reset the conversation
        if (storedStatus !== null && storedStatus !== String(analyticsEnabled)) {
            console.log("Analytics status changed from " + storedStatus + " to " + analyticsEnabled + ", resetting conversation");
            
            // Reset stored conversation
            localStorage.removeItem("chatHistory");
            localStorage.removeItem("conversationHistory");
            conversationHistory = [];
            
            // Force a welcome message reset when we open the chat
            return true;
        }
        
        // Always store current status
        localStorage.setItem("analyticsEnabled", analyticsEnabled);
        return false;
    }
    
    /**
     * Show analytics notice if it's provided
     */
    function showAnalyticsNotice() {
        const analyticsNotice = document.getElementById("analytics-notice");
        const noticeText = analyticsNotice.textContent.trim();
        
        if (noticeText && noticeText !== "%%ANALYTICS_NOTICE%%") {
            analyticsNotice.style.display = "block";
        }
    }
    
    /**
     * Add event listeners to UI elements
     */
    function addEventListeners() {
        const chatWidget = document.getElementById("chat-widget");
        const userInput = document.getElementById("user-input");
        
        if (chatWidget) {
            chatWidget.addEventListener("click", toggleChat);
        }
        
        if (userInput) {
            userInput.addEventListener("keydown", function(event) {
                // Allow growing textarea as content increases
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
                
                // Send message on Enter without Shift key
                if (event.key === "Enter" && !event.shiftKey) {
                    event.preventDefault();
                    sendMessage();
                }
            });
        }
    }

    /**
     * Toggle the chat interface visibility
     */
    function toggleChat() {
        const chatBox = document.getElementById("chat-box");
        if (chatBox.classList.contains("active")) {
            chatBox.classList.remove("active");
            chatBox.style.opacity = "0";
            setTimeout(() => chatBox.style.display = "none", 300);
        } else {
            chatBox.style.display = "flex";
            setTimeout(() => {
                chatBox.style.opacity = "1";
                chatBox.classList.add("active");
            }, 10);
            
            // Check if analytics status has changed and force reset if needed
            const needsReset = checkAnalyticsStatus();
            introduceBot(needsReset);
        }
    }

    /**
     * Display the bot's welcome message if it's the first time opening the chat
     * or forced by reset
     */
    function introduceBot(forceReset = false) {
        const chatMessages = document.getElementById("chat-messages");
        
        // Always show welcome message if forced or first time
        if (forceReset || conversationHistory.length === 0) {
            // Analytics status is now determined from the global variable
            // which is set directly from PHP based on whether analytics are enabled
            
            // Set welcome message based on analytics status
            let welcomeMessage = "Hey! Schön, dass du hier bist. Ich bin dein Freund und Lern-Begleiter. Frag mich einfach, wenn du Hilfe brauchst! 😊";
            
            if (analyticsEnabled) {
                // Hard-coded analytics notice text since the placeholder doesn't seem to get replaced properly
                welcomeMessage = "Hey! Schön, dass du hier bist. Ich bin dein Lern-Begleiter. Deine Referentinnen oder/und Referenten haben die Chat-Analyse aktiviert, um aus deinen Fragen zu lernen, welche Inhalte zusätzliche Nachfragen erzeugt haben. Die Analyse findet anonym statt und ist nie auf dich zurückführbar. Stelle also alle Fragen, und denk daran, es gibt keine dummen Fragen ;-).";
            }
            
            // Clear existing conversation if forced
            if (forceReset) {
                chatMessages.innerHTML = "";
                conversationHistory = [];
            }
            
            const formattedMessage = formatBotResponse(welcomeMessage);
            
            chatMessages.innerHTML += `<div class='chat-bubble bot-message fade-in'><strong>${assistantName}:</strong><br>${formattedMessage}</div>`;
            
            conversationHistory.push({
                role: "assistant",
                content: welcomeMessage
            });
            
            saveConversationHistory();
            scrollToBottom();
            
            // Store current analytics status
            localStorage.setItem("analyticsEnabled", analyticsEnabled);
        }
    }

    /**
     * Scroll the chat window to the bottom
     */
    function scrollToBottom() {
        const chatMessages = document.getElementById("chat-messages");
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    /**
     * Session management - save chat UI state and history
     */
    function saveSession() {
        localStorage.setItem("chatHistory", document.getElementById("chat-messages").innerHTML);
        saveConversationHistory();
    }

    /**
     * Save conversation history to local storage
     */
    function saveConversationHistory() {
        localStorage.setItem("conversationHistory", JSON.stringify(conversationHistory));
    }

    /**
     * Load saved session from local storage
     */
    function loadSession() {
        const chatMessages = document.getElementById("chat-messages");
        const savedHistory = localStorage.getItem("chatHistory");
        if (savedHistory) {
            chatMessages.innerHTML = savedHistory;
            
            const savedConversation = localStorage.getItem("conversationHistory");
            if (savedConversation) {
                try {
                    conversationHistory = JSON.parse(savedConversation);
                } catch (e) {
                    conversationHistory = [];
                }
            }
            
            scrollToBottom();
        }
    }

    /**
     * Reset the chat session
     */
    function resetSession() {
        localStorage.removeItem("chatHistory");
        localStorage.removeItem("conversationHistory");
        document.getElementById("chat-messages").innerHTML = "";
        conversationHistory = [];
        
        // Store current analytics status from the global variable
        localStorage.setItem("analyticsEnabled", analyticsEnabled);
        
        // Force a new welcome message
        introduceBot(true);
    }

    /**
     * Send a user message to the server and handle the response
     */
    async function sendMessage() {
        const inputField = document.getElementById("user-input");
        const message = inputField.value.trim();
        if (!message) return;

        const chatMessages = document.getElementById("chat-messages");
        chatMessages.innerHTML += `<div class='chat-bubble user-message fade-in'><strong>Du:</strong><br>${message}</div>`;
        chatMessages.innerHTML += `<div id="loading" class="loading fade-in"></div>`;
        scrollToBottom();
        inputField.value = "";
        
        conversationHistory.push({
            role: "user",
            content: message
        });
        
        saveSession();

        try {
            // Prepare form data for request
            const formData = new FormData();
            formData.append('message', message);
            formData.append('history', JSON.stringify(conversationHistory));
            
            // Add Moodle session key for CSRF protection - required for security
            if (typeof M !== 'undefined' && M.cfg && M.cfg.sesskey) {
                formData.append('sesskey', M.cfg.sesskey);
            } else {
                // Show error if sesskey is not available
                chatMessages.innerHTML += `<div class='chat-bubble error-message fade-in'><strong>Fehler:</strong><br>Sicherheitstoken (sesskey) fehlt. Bitte lade die Seite neu.</div>`;
                scrollToBottom();
                document.getElementById("loading").remove();
                return;
            }
            
            // Add block ID if available
            const blockId = %%BLOCK_ID%%;
            if (blockId) {
                formData.append('blockid', blockId);
            }
            
            // Add course ID if available
            const courseId = M.cfg.courseId;
            if (courseId) {
                formData.append('courseid', courseId);
            }
            
            // Send request to server
            const response = await fetch("/blocks/chatbot/chatbot.php", {
                method: "POST",
                headers: {
                    "X-Requested-With": "XMLHttpRequest"
                },
                body: formData,
                credentials: 'same-origin' // Ensure cookies are sent with the request
            });

            document.getElementById("loading").remove();
            
            // Check for HTTP errors
            if (!response.ok) {
                throw new Error(`HTTP error! Status: ${response.status}`);
            }
            
            await handleServerResponse(response);
        } catch (error) {
            document.getElementById("loading").remove();
            chatMessages.innerHTML += `<div class='chat-bubble error-message fade-in'><strong>Fehler:</strong><br>Verbindungsproblem: ${error.message}</div>`;
            scrollToBottom();
            saveSession();
        }
    }
    
    /**
     * Handle the server response
     * @param {Response} response - The fetch response object
     */
    async function handleServerResponse(response) {
        const chatMessages = document.getElementById("chat-messages");
        const responseText = await response.text();
        let data;
        
        try {
            data = JSON.parse(responseText);
        } catch (jsonError) {
            // Handle non-JSON responses
            if (responseText && responseText.trim().length > 0) {
                const plainTextResponse = responseText.trim();
                const formattedMessage = formatBotResponse(plainTextResponse);
                chatMessages.innerHTML += `<div class='chat-bubble error-message fade-in'><strong>Debug:</strong><br>${formattedMessage}</div>`;
                
                conversationHistory.push({
                    role: "assistant",
                    content: plainTextResponse
                });
            } else {
                chatMessages.innerHTML += `<div class='chat-bubble error-message fade-in'><strong>Fehler:</strong><br>Die Server-Antwort konnte nicht verarbeitet werden.</div>`;
            }
            saveConversationHistory();
            return;
        }
        
        // Check for API error
        if (data.error) {
            chatMessages.innerHTML += `<div class='chat-bubble error-message fade-in'><strong>Fehler:</strong><br>${data.message || 'Ein Fehler ist aufgetreten.'}</div>`;
            scrollToBottom();
            saveSession();
            return;
        }

        if (data.response) {
            // Format the response text
            let formattedResponse = formatBotResponse(data.response);
            
            chatMessages.innerHTML += `<div class='chat-bubble bot-message fade-in'><strong>${assistantName}:</strong><br>${formattedResponse}</div>`;
            
            // Add assistant response to conversation history
            if (data.lastMessage) {
                conversationHistory.push(data.lastMessage);
            } else {
                conversationHistory.push({
                    role: "assistant",
                    content: data.response
                });
            }
        } else {
            chatMessages.innerHTML += `<div class='chat-bubble error-message fade-in'><strong>Fehler:</strong><br>Hm, da scheint was schiefgelaufen zu sein. Versuch's nochmal!</div>`;
        }
        
        scrollToBottom();
        saveSession();
    }
    
    /**
     * Format bot messages with markdown-like syntax
     * @param {string} text - The raw text to format
     * @returns {string} - The formatted HTML
     */
    function formatBotResponse(text) {
        // Sanitize text to prevent XSS
        let formatted = sanitizeHTML(text);
        
        // Process numbered lists
        formatted = processNumberedLists(formatted);
        
        // Process headers
        formatted = processHeaders(formatted);
        
        // Process bullet lists
        formatted = processBulletLists(formatted);
        
        // Cleanup and final formatting
        formatted = cleanupFormatting(formatted);
            
        return formatted;
    }
    
    /**
     * Sanitize HTML to prevent XSS attacks
     * @param {string} text - The text to sanitize
     * @returns {string} - The sanitized text
     */
    function sanitizeHTML(text) {
        const element = document.createElement('div');
        element.textContent = text;
        return element.innerHTML;
    }
    
    /**
     * Process numbered lists in text
     * @param {string} text - Text to process
     * @returns {string} - Processed text with HTML numbered lists
     */
    function processNumberedLists(text) {
        let lines = text.split('\n');
        let inNumberedList = false;
        let numberedListItems = [];
        
        // First pass: identify and collect numbered list items
        for (let i = 0; i < lines.length; i++) {
            const numberedMatch = lines[i].match(/^(\d+)\.\s+(.*?)$/);
            
            if (numberedMatch) {
                if (!inNumberedList) {
                    inNumberedList = true;
                    lines[i] = `__NUMBERED_LIST_START__${i}__`;
                    numberedListItems.push({
                        start: i,
                        items: [`<div class="numbered-item">${numberedMatch[1]}. ${numberedMatch[2].trim()}</div>`]
                    });
                } else {
                    const currentList = numberedListItems[numberedListItems.length - 1];
                    currentList.items.push(`<div class="numbered-item">${numberedMatch[1]}. ${numberedMatch[2].trim()}</div>`);
                    lines[i] = '';
                }
            } else {
                inNumberedList = false;
            }
        }
        
        // Second pass: replace placeholders with HTML
        numberedListItems.forEach(list => {
            const numberedListHtml = `<div class="numbered-list">${list.items.join('')}</div>`;
            lines[list.start] = numberedListHtml;
        });
        
        return lines.join('\n');
    }
    
    /**
     * Process header tags in text
     * @param {string} text - Text to process
     * @returns {string} - Processed text with HTML headers
     */
    function processHeaders(text) {
        return text
            .replace(/^# (.*?)$/gm, "<h3>$1</h3>")
            .replace(/\n# (.*?)$/gm, "<br><h3>$1</h3>")
            .replace(/^## (.*?)$/gm, "<h4>$1</h4>")
            .replace(/\n## (.*?)$/gm, "<br><h4>$1</h4>")
            .replace(/^### (.*?)$/gm, "<h5>$1</h5>")
            .replace(/\n### (.*?)$/gm, "<br><h5>$1</h5>");
    }
    
    /**
     * Process bullet lists in text
     * @param {string} text - Text to process
     * @returns {string} - Processed text with HTML bullet lists
     */
    function processBulletLists(text) {
        let processed = text.replace(/^- (.*?)$/gm, function(match, content) {
            return `<div class="bullet-item">• ${content.trim()}</div>`;
        });
        
        return processed.replace(/\n- (.*?)$/gm, function(match, content) {
            return `\n<div class="bullet-item">• ${content.trim()}</div>`;
        });
    }
    
    /**
     * Cleanup and apply final formatting
     * @param {string} text - Text to clean up
     * @returns {string} - Cleaned text with final formatting applied
     */
    function cleanupFormatting(text) {
        // Limit consecutive newlines
        let cleaned = text.replace(/\n{2,}/g, '\n');
        
        // Special handling for consecutive lists
        cleaned = cleaned.replace(/(<\/div>\n<div class="numbered-list">|<\/div>\n<div class="bullet-item">)/g, '</div><div class="numbered-list">');
        
        // Process remaining paragraph structure
        cleaned = cleaned.replace(/\n\n/g, "<br>");
        
        // Final formatting
        return cleaned
            .replace(/\n/g, " ") // Replace newlines with spaces
            .replace(/(<br>){2,}/g, "<br>") // Limit consecutive <br> tags
            .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
            .replace(/\*(.*?)\*/g, "<em>$1</em>");
    }
    
    /**
     * Initialize prompt suggestions with hierarchical categories
     */
    function initPromptSuggestions() {
        if (!promptSuggestionsEnabled || !promptSuggestions) {
            return;
        }
        
        // Show suggestions button
        document.getElementById('suggestions-button').style.display = 'block';
        
        // Setup back button handler
        const backButton = document.getElementById('prompt-back-button');
        backButton.addEventListener('click', navigateBackToCategories);
        
        // Parse and organize suggestions
        parsePromptSuggestions();
    }
    
    /**
     * Parse prompt suggestions and detect categories if present
     */
    function parsePromptSuggestions() {
        const suggestionsContent = document.getElementById('prompt-suggestions-content');
        suggestionsContent.innerHTML = ''; // Clear existing content
        
        // Parse suggestions
        const suggestionLines = promptSuggestions.split('\n').filter(line => line.trim() !== '');
        
        // Check if we have categories (lines starting with #)
        const hasCategories = suggestionLines.some(line => line.trim().startsWith('#'));
        
        if (hasCategories) {
            // Process hierarchical structure
            let currentCategory = null;
            let categoryPrompts = {};
            
            // First pass: identify categories and their prompts
            suggestionLines.forEach(line => {
                const trimmedLine = line.trim();
                
                if (trimmedLine.startsWith('#')) {
                    // This is a category header
                    currentCategory = trimmedLine.substring(1).trim();
                    if (!categoryPrompts[currentCategory]) {
                        categoryPrompts[currentCategory] = [];
                    }
                } else if (currentCategory && trimmedLine) {
                    // This is a prompt under the current category
                    categoryPrompts[currentCategory].push(trimmedLine);
                }
            });
            
            // Create category elements
            for (const category in categoryPrompts) {
                const categoryElem = document.createElement('div');
                categoryElem.className = 'prompt-category';
                categoryElem.textContent = category;
                categoryElem.dataset.category = category;
                categoryElem.onclick = function() {
                    showCategoryPrompts(category, categoryPrompts[category]);
                };
                suggestionsContent.appendChild(categoryElem);
            }
        } else {
            // No categories, display flat list of suggestions
            suggestionLines.forEach(suggestion => {
                if (suggestion.trim()) {
                    const suggestionElem = document.createElement('div');
                    suggestionElem.className = 'prompt-suggestion';
                    suggestionElem.textContent = suggestion.trim();
                    suggestionElem.onclick = function() {
                        usePromptSuggestion(suggestion.trim());
                    };
                    suggestionsContent.appendChild(suggestionElem);
                }
            });
        }
    }
    
    /**
     * Show prompts for a specific category
     */
    function showCategoryPrompts(category, prompts) {
        const suggestionsContent = document.getElementById('prompt-suggestions-content');
        const backButton = document.getElementById('prompt-back-button');
        
        // Clear current content
        suggestionsContent.innerHTML = '';
        
        // Show back button
        backButton.style.display = 'block';
        
        // Add category title
        const categoryTitle = document.createElement('div');
        categoryTitle.style.fontWeight = 'bold';
        categoryTitle.style.marginBottom = '10px';
        categoryTitle.textContent = category;
        suggestionsContent.appendChild(categoryTitle);
        
        // Add prompts for this category
        prompts.forEach(prompt => {
            const promptElem = document.createElement('div');
            promptElem.className = 'prompt-suggestion';
            promptElem.textContent = prompt;
            promptElem.onclick = function() {
                usePromptSuggestion(prompt);
            };
            suggestionsContent.appendChild(promptElem);
        });
    }
    
    /**
     * Navigate back to the categories view
     */
    function navigateBackToCategories() {
        const backButton = document.getElementById('prompt-back-button');
        backButton.style.display = 'none';
        
        // Reparse and show categories
        parsePromptSuggestions();
    }
    
    /**
     * Toggle the visibility of prompt suggestions panel
     */
    function togglePromptSuggestions() {
        const panel = document.getElementById('prompt-suggestions-panel');
        promptSuggestionsOpen = !promptSuggestionsOpen;
        
        if (promptSuggestionsOpen) {
            panel.style.display = 'block';
            // Reset to top level view when opening
            const backButton = document.getElementById('prompt-back-button');
            backButton.style.display = 'none';
            parsePromptSuggestions();
        } else {
            panel.style.display = 'none';
        }
    }
    
    /**
     * Use a prompt suggestion
     */
    function usePromptSuggestion(suggestion) {
        const inputField = document.getElementById('user-input');
        inputField.value = suggestion;
        togglePromptSuggestions(); // Hide suggestions panel
        
        // Focus on the input field and move cursor to the end
        inputField.focus();
        inputField.selectionStart = inputField.selectionEnd = inputField.value.length;
    }
</script>
